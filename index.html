<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main>
        <h1 id="title">Developer Fuel Survey</h1>
        <p id="description">Help us optimize the caffeine and snack levels at the dev campus cafeteria.</p>

        <form id="survey-form">
            <div class="form-group">
                <label id="name-label" for="name">Name</label>
                <input type="text" id="name" placeholder="Enter your name" required />
            </div>

            <div class="form-group">
                <label id="email-label" for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email" required />
            </div>

            <div class="form-group">
                <label id="number-label" for="number">Cups of Caffeine Per Day (Age Limit: 15-99)</label>
                <input type="number" id="number" min="15" max="99" placeholder="Enter your age" />
            </div>

            <div class="form-group">
                <label for="dropdown">Primary Programming Language</label>
                <select id="dropdown">
                    <option value="" disabled selected>Select your main stack</option>
                    <option value="javascript">JavaScript / TypeScript</option>
                    <option value="python">Python</option>
                    <option value="rust">Rust</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <p>Preferred Caffeine Source:</p>
                <label>
                    <input type="radio" name="caffeine-source" value="coffee" checked /> Coffee
                </label>
                <label>
                    <input type="radio" name="caffeine-source" value="energy-drink" /> Energy Drinks
                </label>
                <label>
                    <input type="radio" name="caffeine-source" value="tea" /> Tea
                </label>
            </div>

            <div class="form-group">
                <p>What snacks keep you rendering at 60fps? (Select all that apply)</p>
                <label>
                    <input type="checkbox" name="snacks" value="dark-chocolate" /> Dark Chocolate
                </label>
                <label>
                    <input type="checkbox" name="snacks" value="gummy-bears" /> Gummy Bears
                </label>
                <label>
                    <input type="checkbox" name="snacks" value="nuts" /> Mixed Nuts
                </label>
            </div>

            <div class="form-group">
                <label for="comments">Any feature requests for the cafeteria bar?</label>
                <textarea id="comments" placeholder="e.g., More oat milk, overnight cold brew..."></textarea>
            </div>

            <button type="submit" id="submit">Submit Feedback</button>
        </form>
    </main>
</body>

</html>
